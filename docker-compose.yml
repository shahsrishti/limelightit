version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mfg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manufacturing_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mfg-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mfg-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - mfg-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mfg-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/manufacturing_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/src:/app/src
    networks:
      - mfg-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mfg-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
    networks:
      - mfg-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  mfg-network:
    driver: bridge
