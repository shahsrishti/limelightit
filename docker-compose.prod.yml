version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mfg-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-manufacturing_db}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - mfg-network-prod
    restart: always

  redis:
    image: redis:7-alpine
    container_name: mfg-redis-prod
    volumes:
      - redisdata_prod:/data
    networks:
      - mfg-network-prod
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mfg-backend-prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-manufacturing_db}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - mfg-network-prod
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mfg-frontend-prod
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api/v1
    depends_on:
      - backend
    networks:
      - mfg-network-prod
    restart: always

  nginx:
    image: nginx:alpine
    container_name: mfg-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mfg-network-prod
    restart: always

volumes:
  pgdata_prod:
  redisdata_prod:

networks:
  mfg-network-prod:
    driver: bridge
